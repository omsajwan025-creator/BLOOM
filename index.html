/* ---------------------------------------------------------

--------------------------------------------------------- */
const pad = n => String(n).padStart(2, '0');
const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = new Date();
const todayKey = toKey(today);

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES = ['S','M','T','W','T','F','S'];
const WEEKDAY_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function addDays(date, delta) {
  const d = new Date(date);
  d.setDate(d.getDate() + delta);
  return d;
}

function prettyDate(d) {
  return `${WEEKDAY_LONG[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
}

// turns a day's entries into a warm, plain-language summary
function summarizeDay(dayLabel, entries) {
  if (!entries || entries.length === 0) return null;
  const timeLabels = ['in the morning', 'for lunch', 'for dinner', 'as a little extra'];
  const parts = entries.map((e, i) => `${e.name.toLowerCase()} ${timeLabels[Math.min(i, timeLabels.length - 1)]}`);
  let joined;
  if (parts.length === 1) joined = parts[0];
  else if (parts.length === 2) joined = `${parts[0]} and ${parts[1]}`;
  else joined = `${parts.slice(0, -1).join(', ')} and ${parts[parts.length - 1]}`;
  return `${dayLabel} was a good day — you had ${joined} 🌸`;
}

/* ---------------------------------------------------------
   "bloom. ai" food matching + calorie recalculation
--------------------------------------------------------- */
function guessFood(text) {
  const lower = text.toLowerCase();
  let best = null;
  let bestScore = 0;
  for (const food of FOOD_DB) {
    for (const kw of food.keywords) {
      if (lower.includes(kw) && kw.length > bestScore) {
        bestScore = kw.length;
        best = food;
      }
    }
  }
  if (best) return best;
  const label = text.trim().replace(/\b\w/g, c => c.toUpperCase()).slice(0, 30) || 'My Meal';
  return { name: label, emoji: '🍽️', calories: 350, category: 'generic', keywords: [] };
}

function computeCalories(food, answers, freeText) {
  const questions = QUESTION_SETS[food.category] || QUESTION_SETS.generic;
  let cal = food.calories;

  questions.forEach(q => {
    const ans = answers[q.id];
    if (!ans) return;
    if (q.type === 'single') {
      const opt = q.options.find(o => o.label === ans);
      if (!opt) return;
      if (q.mode === 'multiply') cal = food.calories * Number(opt.value);
      else cal += opt.value;
    } else if (q.type === 'multi' && Array.isArray(ans)) {
      ans.forEach(label => {
        const opt = q.options.find(o => o.label === label);
        if (opt) cal += opt.value;
      });
    }
  });

  if (freeText && freeText.trim()) {
    const lower = freeText.toLowerCase();
    Object.entries(FREE_TEXT_KEYWORDS).forEach(([kw, val]) => {
      if (lower.includes(kw)) cal += val;
    });
  }

  return Math.max(20, Math.round(cal));
}

/* ---------------------------------------------------------
   localStorage helpers
--------------------------------------------------------- */
function loadLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}
function saveLS(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

function FoodQuestions({ result, answers, setAnswers, freeText, setFreeText, heading, onContinue }) {
  const questions = QUESTION_SETS[result.category] || QUESTION_SETS.generic;

  const setSingle = (qid, label) => setAnswers(prev => ({ ...prev, [qid]: label }));
  const toggleMulti = (qid, label) => setAnswers(prev => {
    const current = prev[qid] || [];
    const next = current.includes(label) ? current.filter(x => x !== label) : [...current, label];
    return { ...prev, [qid]: next };
  });

  return (
    <div className="h-full flex flex-col px-6 pt-8 pb-28 screen-enter relative z-10 overflow-y-auto no-scrollbar">
      <div className="text-center mb-6">
        <p className="text-6xl mb-2">{result.emoji}</p>
        <h2 className="font-display text-2xl text-gray-800">{heading}</h2>
        <p className="text-xs text-gray-400 mt-1">help us get the details right</p>
      </div>

      {questions.map(q => (
        <div key={q.id} className="bg-white rounded-4xl shadow-softer p-5 mb-4 border border-blossom-50">
          <p className="font-semibold text-gray-600 text-sm mb-3">{q.label}</p>
          {q.type === 'single' ? (
            <div className="flex gap-2">
              {q.options.map(opt => (
                <button
                  key={opt.label}
                  onClick={() => setSingle(q.id, opt.label)}
                  className={`flex-1 py-2.5 rounded-2xl text-sm font-semibold transition-all border ${
                    answers[q.id] === opt.label
                      ? 'bg-gradient-to-br from-blossom-300 to-blossom-500 text-white border-transparent shadow-softer'
                      : 'bg-blossom-50 text-blossom-400 border-blossom-100'
                  }`}
                >
                  {opt.label}
                </button>
              ))}
            </div>
          ) : (
            <div className="flex flex-wrap gap-2">
              {q.options.map(opt => {
                const active = (answers[q.id] || []).includes(opt.label);
                return (
                  <button
                    key={opt.label}
                    onClick={() => toggleMulti(q.id, opt.label)}
                    className={`px-3.5 py-2 rounded-full text-sm font-medium transition-all border flex items-center gap-1.5 ${
                      active
                        ? 'bg-lilac-100 border-lilac-300 text-gray-600'
                        : 'bg-blossom-50 border-blossom-100 text-gray-400'
                    }`}
                  >
                    {opt.emoji && <span>{opt.emoji}</span>}{opt.label}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      ))}

      <div className="bg-white rounded-4xl shadow-softer p-5 mb-6 border border-blossom-50">
        <p className="font-semibold text-gray-600 text-sm mb-3">anything else?</p>
        <input
          type="text"
          value={freeText}
          onChange={e => setFreeText(e.target.value)}
          placeholder="anything else? describe exactly what's in it..."
          className="w-full bg-blossom-50 rounded-2xl border border-blossom-100 px-4 py-3 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blossom-200"
        />
      </div>

      <button
        onClick={onContinue}
        className="mt-auto bg-gradient-to-br from-blossom-300 to-blossom-500 text-white font-semibold py-3.5 rounded-3xl shadow-soft active:scale-95 transition-transform"
      >
        see my result
      </button>
    </div>
  );
}

function FoodResult({ result, answers, freeText, onSaved, onClose }) {
  const calories = computeCalories(result, answers, freeText);

  useEffect(() => {
    onSaved({ name: result.name, emoji: result.emoji, calories });
    const t = setTimeout(() => onClose(), 1600);
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const questions = QUESTION_SETS[result.category] || QUESTION_SETS.generic;
  const summaryParts = [];
  questions.forEach(q => {
    const ans = answers[q.id];
    if (!ans) return;
    if (q.type === 'single') summaryParts.push(ans);
    else if (Array.isArray(ans) && ans.length) summaryParts.push(ans.join(', '));
  });
  if (freeText.trim()) summaryParts.push(freeText.trim());

  return (
    <div className="h-full flex flex-col px-6 pt-12 pb-28 screen-enter relative z-10">
      <div className="flex-1 flex flex-col items-center justify-center text-center relative">
        <div className="bloom-celebrate text-4xl absolute left-1/2" style={{ top: '4%' }} aria-hidden="true">🌸</div>
        <div className="w-28 h-28 rounded-full bg-blossom-50 flex items-center justify-center text-6xl mb-5 shadow-softer">
          {result.emoji}
        </div>
        <h2 className="font-display text-3xl text-gray-800 mb-1">{result.name}</h2>
        {summaryParts.length > 0 && (
          <p className="text-xs text-gray-400 mb-5">{summaryParts.join(' · ')}</p>
        )}
        <div className="bg-white rounded-4xl shadow-soft px-10 py-6 border border-blossom-100 mb-4">
          <p className="font-display text-5xl text-blossom-500 leading-none">{calories}</p>
          <p className="text-xs text-gray-400 font-semibold mt-1 tracking-wide">approx. calories</p>
        </div>
        <div className="save-toast bg-blossom-50 rounded-full px-5 py-2.5">
          <p className="text-sm font-semibold text-blossom-500">saved 🌸</p>
        </div>
      </div>
    </div>
  );
}

function CameraScreen({ onSaved, onClose }) {
  const [step, setStep] = useState('camera'); // camera -> questions -> result
  const [answers, setAnswers] = useState({});
  const [freeText, setFreeText] = useState('');
  const [result, setResult] = useState(null);
  const [cameraReady, setCameraReady] = useState(false);
  const [cameraError, setCameraError] = useState(false);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => {
          if (cancelled) {
            stream.getTracks().forEach(t => t.stop());
            return;
          }
          streamRef.current = stream;
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
          }
          setCameraReady(true);
        })
        .catch(() => {
          if (!cancelled) setCameraError(true);
        });
    } else {
      setCameraError(true);
    }
    return () => {
      cancelled = true;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, []);

  const takePhoto = () => {
    const food = FOOD_DB[Math.floor(Math.random() * FOOD_DB.length)];
    setResult(food);
    setAnswers({});
    setFreeText('');
    setStep('questions');
  };

  if (step === 'camera') {
    return (
      <div className="h-full flex flex-col screen-enter relative z-10">
        <div className="flex items-center justify-between px-6 pt-8 pb-4">
          <button onClick={onClose} className="text-gray-400 text-sm font-semibold">close</button>
          <p className="text-2xl"><Logo /></p>
          <div className="w-10"></div>
        </div>

        {/* Viewfinder */}
        <div className="flex-1 min-h-0 mx-5 rounded-4xl relative overflow-hidden border-4 border-white shadow-soft"
             style={{ background: 'linear-gradient(160deg, #FFE3EE 0%, #F0E2FF 60%, #FFE9F2 100%)' }}>
          <video
            ref={videoRef}
            autoPlay
            playsInline
            muted
            className="absolute inset-0 w-full h-full object-cover"
            style={{ opacity: cameraReady ? 1 : 0 }}
          />
          {!cameraReady && <Petals count={6} />}
          {!cameraReady && (
            <div className="absolute inset-0 flex items-center justify-center flex-col gap-3 z-10">
              <div className="text-6xl">🍽️</div>
              <p className="text-blossom-500 font-semibold text-sm">
                {cameraError ? 'allow camera access to see your food' : 'getting your camera ready...'}
              </p>
            </div>
          )}
          {/* viewfinder corners */}
          {['top-6 left-6 border-t-2 border-l-2', 'top-6 right-6 border-t-2 border-r-2', 'bottom-6 left-6 border-b-2 border-l-2', 'bottom-6 right-6 border-b-2 border-r-2'].map((cls,i) => (
            <div key={i} className={`absolute w-8 h-8 border-white/80 rounded-sm z-10 ${cls}`}></div>
          ))}
        </div>

        <div className="flex flex-col items-center py-8">
          <button
            onClick={takePhoto}
            className="w-20 h-20 rounded-full bg-white border-4 border-blossom-300 shadow-soft active:scale-95 transition-transform flex items-center justify-center"
          >
            <div className="w-14 h-14 rounded-full bg-gradient-to-br from-blossom-300 to-blossom-500"></div>
          </button>
          <p className="text-xs text-blossom-400 font-semibold mt-3 tracking-wide">tap to capture</p>
        </div>
      </div>
    );
  }

  if (step === 'questions') {
    return (
      <FoodQuestions
        result={result}
        answers={answers}
        setAnswers={setAnswers}
        freeText={freeText}
        setFreeText={setFreeText}
        heading={`Looks like ${result.name}!`}
        onContinue={() => setStep('result')}
      />
    );
  }

  return (
    <FoodResult
      result={result}
      answers={answers}
      freeText={freeText}
      onSaved={onSaved}
      onClose={onClose}
    />
  );
}

function CalendarScreen({ diary }) {
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selected, setSelected] = useState(today);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));

  const changeMonth = (delta) => {
    setViewDate(new Date(year, month + delta, 1));
  };

  const selectedEntries = diary[toKey(selected)] || [];
  const selectedTotal = selectedEntries.reduce((s,e) => s + e.calories, 0);
  const isSelectedToday = toKey(selected) === todayKey;
  const dayLabel = isSelectedToday ? 'Today' : WEEKDAY_LONG[selected.getDay()];
  const daySummary = summarizeDay(dayLabel, selectedEntries);

  return (
    <div className="h-full flex flex-col px-6 pt-8 pb-28 screen-enter relative z-10">
      <div className="text-center mb-5">
        <h1 className="text-3xl"><Logo /></h1>
        <p className="text-xs text-gray-400 font-medium mt-1">your food journal</p>
      </div>

      <div className="bg-white rounded-4xl shadow-soft p-5 border border-blossom-100 mb-4">
        <div className="flex items-center justify-between mb-4">
          <button onClick={() => changeMonth(-1)} className="w-11 h-11 rounded-full bg-blossom-50 flex items-center justify-center text-blossom-400 font-bold">‹</button>
          <p className="font-display text-lg text-gray-700">{MONTH_NAMES[month]} {year}</p>
          <button onClick={() => changeMonth(1)} className="w-11 h-11 rounded-full bg-blossom-50 flex items-center justify-center text-blossom-400 font-bold">›</button>
        </div>

        <div className="grid grid-cols-7 mb-2">
          {DAY_NAMES.map((d,i) => (
            <div key={i} className="text-center text-[11px] font-semibold text-gray-300">{d}</div>
          ))}
        </div>

        <div className="grid grid-cols-7 gap-y-1">
          {cells.map((d, i) => {
            if (!d) return <div key={i}></div>;
            const key = toKey(d);
            const hasEntry = !!diary[key];
            const isSelected = toKey(selected) === key;
            const isToday = key === todayKey;
            return (
              <button
                key={i}
                onClick={() => setSelected(d)}
                className="flex flex-col items-center justify-center py-1.5 relative"
              >
                <span className={`w-8 h-8 flex items-center justify-center rounded-full text-sm font-semibold transition-all ${
                  isSelected
                    ? 'bg-gradient-to-br from-blossom-300 to-blossom-500 text-white shadow-softer'
                    : isToday
                      ? 'border-2 border-blossom-300 text-blossom-500'
                      : 'text-gray-500'
                }`}>
                  {d.getDate()}
                </span>
                {hasEntry && (
                  <span className={`w-1.5 h-1.5 rounded-full mt-0.5 ${isSelected ? 'bg-blossom-400' : 'bg-blossom-300'}`}></span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      <div className="flex items-center justify-between px-1 mb-3">
        <p className="text-sm font-semibold text-gray-500">{prettyDate(selected)}</p>
        {selectedEntries.length > 0 && (
          <p className="text-sm font-semibold text-blossom-500">{selectedTotal} kcal</p>
        )}
      </div>

      {daySummary && (
        <div className="bg-gradient-to-br from-blossom-50 to-lilac-100 rounded-3xl p-4 mb-3">
          <p className="text-xs text-gray-600 leading-relaxed">{daySummary}</p>
        </div>
      )}

      <div className="flex-1 min-h-0 overflow-y-auto no-scrollbar space-y-3">
        {selectedEntries.length === 0 && (
          <div className="text-center text-gray-400 text-sm pt-8 font-medium">
            {isSelectedToday ? <>your story starts today 🌸</> : <>no entries this day 🌷</>}
          </div>
        )}
        {selectedEntries.map((e, i) => (
          <div key={i} className="bg-white rounded-3xl shadow-softer p-4 flex items-center gap-4 border border-blossom-50 pop">
            <div className="w-12 h-12 rounded-2xl bg-blossom-50 flex items-center justify-center text-2xl">

            <div className="flex-1">
              <p className="font-semibold text-gray-700 text-sm">{e.name}</p>
            </div>
            <div className="text-right">
              <p className="font-display text-lg text-blossom-500 font-semibold leading-none">{e.calories}</p>
              <p className="text-[10px] text-gray-400">kcal</p>

          onClick={submit}
          disabled={!text.trim()}
          className="bg-gradient-to-br from-blossom-300 to-blossom-500 text-white font-semibold py-3.5 rounded-3xl shadow-soft active:scale-95 transition-transform disabled:opacity-40"
        >
          ask bloom. ai
        </button>
      </div>
    );
  }

  if (step === 'thinking') {
    return (
      <div className="h-full flex flex-col items-center justify-center screen-enter relative z-10">
        <div className="text-5xl mb-4 blossom-spin">🌸</div>
        <p className="text-blossom-400 font-semibold text-sm">thinking about your meal...</p>
      </div>
    );
  }

  if (step === 'questions') {
    return (
      <FoodQuestions
        result={result}
        answers={answers}
        setAnswers={setAnswers}
        freeText={freeText}
        setFreeText={setFreeText}
        heading={`Sounds like ${result.name}!`}
        onContinue={() => setStep('result')}
      />
    );
  }

  return (
    <FoodResult
      result={result}
      answers={answers}
      freeText={freeText}
      onSaved={onSaved}
      onClose={onClose}
    />
  );
}

/* ---------------------------------------------------------
   Nutrient / nourishment panel (calorie wheel tap)
--------------------------------------------------------- */
function NutrientPanel({ diary, goal, cyclePhase, onClose }) {
  const entries = diary[todayKey] || [];
  const total = entries.reduce((s, e) => s + e.calories, 0);

  const todayTags = useMemo(() => {
    const tags = new Set();
    entries.forEach(e => getNutrientTags(e.name).forEach(t => tags.add(t)));
    return tags;
  }, [diary]);

  const missingToday = ALL_NUTRIENTS.filter(n => !todayTags.has(n)).slice(0, 3);

  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  // gentle food ideas for the rest of the day, framed around what would feel good
  let ideas = missingToday.map(n =>
    `${cap(NUTRIENT_INFO[n].foods)} — your body might love these today ${NUTRIENT_INFO[n].emoji}`
  );
  if (cyclePhase && CYCLE_SUGGESTIONS[cyclePhase]) {
    ideas = [...CYCLE_SUGGESTIONS[cyclePhase], ...ideas];
  }
  if (ideas.length === 0) {
    ideas = ["You're nourishing your body so beautifully today 🌸"];
  }
  ideas = ideas.slice(0, 3);

  return (
    <div className="absolute inset-0 z-40">
      <div className="absolute inset-0 bg-black/20 backdrop-enter" onClick={onClose}></div>
      <div className="absolute bottom-0 left-0 right-0 max-h-[85%] bg-white rounded-t-[2.5rem] shadow-2xl sheet-enter overflow-y-auto no-scrollbar"
           style={{ paddingBottom: 'max(1.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-center pt-3">
          <div className="w-10 h-1.5 rounded-full bg-blossom-100"></div>
        </div>

        <div className="px-6 pt-4 pb-2">
          <h2 className="font-display text-2xl text-gray-800 text-center mb-4">your nourishment</h2>

          {/* today's intake */}
          <div className="bg-blossom-50 rounded-3xl p-4 mb-3 text-center">
            <p className="text-sm text-gray-600 leading-relaxed">
              you've nourished your body with <span className="font-display text-xl text-blossom-500 font-semibold">{total}</span> calories today 🌸
            </p>
            <p className="text-xs text-gray-400 mt-2">your gentle daily goal is {goal} kcal — there's no pressure here, just a soft guide 💗</p>
          </div>

          {/* cycle note */}
          {cyclePhase && CYCLE_NOTES[cyclePhase] && (
            <div className="bg-lilac-100 rounded-3xl p-4 mb-3 text-center">
              <p className="text-sm text-gray-600 leading-relaxed">{CYCLE_NOTES[cyclePhase]}</p>
            </div>
          )}

          {/* gentle food ideas for the rest of the day */}
          <div className="mb-2">
            <p className="text-sm font-semibold text-gray-600 mb-2 px-1">your body might love these today</p>
            <div className="space-y-2">
              {ideas.map((s, i) => (
                <div key={i} className="bg-gradient-to-br from-blossom-50 to-lilac-100 rounded-2xl p-3.5">
                  <p className="text-xs text-gray-600 leading-relaxed">{s}</p>
                </div>
              ))}
            </div>
          </div>

          <button
            onClick={onClose}
            className="w-full mt-4 bg-white text-blossom-400 font-semibold py-3 rounded-3xl border border-blossom-200 active:scale-95 transition-transform"
          >
            close
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   App shell
--------------------------------------------------------- */
function App() {
  const [screen, setScreen] = useState('home');
  const [diary, setDiary] = useState(() => loadLS('bloom_diary', initialDiary));
  const [goal, setGoal] = useState(() => loadLS('bloom_goal', 1800));
  const [cyclePhase, setCyclePhase] = useState(() => loadLS('bloom_cycle', null));
  const [vibe, setVibe] = useState(() => loadLS('bloom_vibe', 3));
  const [toast, setToast] = useState(null);
  const [showWheel, setShowWheel] = useState(false);

  useEffect(() => { saveLS('bloom_diary', diary); }, [diary]);
  useEffect(() => { saveLS('bloom_goal', goal); }, [goal]);
  useEffect(() => { saveLS('bloom_cycle', cyclePhase); }, [cyclePhase]);
  useEffect(() => { saveLS('bloom_vibe', vibe); }, [vibe]);

  const handleSaved = (entry) => {
    setDiary(prev => ({
      ...prev,
      [todayKey]: [...(prev[todayKey] || []), entry],
    }));
    setToast(`${entry.name} saved to your diary 🌸`);
    setTimeout(() => setToast(null), 2200);
  };

  let content;
  if (screen === 'home') content = <HomeScreen diary={diary} goal={goal} cyclePhase={cyclePhase} onScan={() => setScreen('camera')} onOpenWheel={() => setShowWheel(true)} />;
  else if (screen === 'camera') content = <CameraScreen onSaved={handleSaved} onClose={() => setScreen('home')} />;
  else if (screen === 'add') content = <AddScreen onSaved={handleSaved} onClose={() => setScreen('home')} />;
  else if (screen === 'calendar') content = <CalendarScreen diary={diary} />;
  else content = <ProfileScreen goal={goal} setGoal={setGoal} cyclePhase={cyclePhase} setCyclePhase={setCyclePhase} vibe={vibe} setVibe={setVibe} />;

  return (
    <div
      className="relative bg-[#FFF9FB] overflow-hidden"
      style={{ width: '100vw', height: '100dvh', paddingTop: 'env(safe-area-inset-top)' }}
    >
      <Petals count={10} />
      {content}
      <BottomNav active={screen} onChange={setScreen} />
      {showWheel && screen === 'home' && (
        <NutrientPanel diary={diary} goal={goal} cyclePhase={cyclePhase} onClose={() => setShowWheel(false)} />
      )}
      {toast && (
        <div className="absolute top-6 left-1/2 -translate-x-1/2 bg-white shadow-soft rounded-full px-5 py-2.5 text-sm font-semibold text-blossom-500 border border-blossom-100 z-50 pop max-w-[85%] text-center"
             style={{ marginTop: 'env(safe-area-inset-top)' }}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
